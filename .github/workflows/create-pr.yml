name: Create Pull Request

on:
  push:
    branches-ignore:
      - main

permissions:
  contents: read
  pull-requests: write

jobs:
  create-pr:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Create PR
        run: gh pr create --fill --base main
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
